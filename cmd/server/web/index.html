<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IGC 3D Gliding Viewer</title>
    <link
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">IGC 3D Gliding Viewer</div>
      <div class="controls">
        <label for="igcFileInput">IGC File</label>
        <input id="igcFileInput" type="file" accept=".igc" />
        <button id="uploadBtn">Upload</button>
        <label for="units">Units</label>
        <select id="units">
          <option value="australian" selected>Australian (ft / kt / km/h XC)</option>
          <option value="standard">European (m / km/h / m/s)</option>
        </select>
        <label for="baseView">View</label>
        <select id="baseView">
          <option value="map">Map</option>
          <option value="satellite" selected>Satellite</option>
        </select>
        <label for="playbackSpeed">Replay</label>
        <select id="playbackSpeed">
          <option value="1">1× real time</option>
          <option value="2">2×</option>
          <option value="5">5×</option>
          <option value="10" selected>10×</option>
          <option value="20">20×</option>
          <option value="50">50×</option>
          <option value="100">100×</option>
        </select>
        <label for="followCam">Follow Cam</label>
        <select id="followCam">
          <option value="off" selected>Off</option>
          <option value="on">On</option>
        </select>
        <button id="playBtn" disabled>Play</button>
      </div>
    </header>
    <main>
      <aside class="panel" id="infoPanel">
        <h2>Flight Info</h2>
        <div id="info"></div>
      </aside>
      <section id="map"></section>
    </main>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/deck.gl@9.0.40/dist.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
